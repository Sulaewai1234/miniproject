<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="d-flex">
     <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <div class="sidebar-header text-center py-4">
                <img id="sidebar-logo" src="/images/default-logo.png" width="120" height="120" class="rounded-circle mb-2" alt="Logo">
                <h4 class="text-white">Software</h4>
            </div>
            <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/dashboard/main"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/welcome"><i class="bi bi-people"></i> User Management</a></li>
    
    <li class="nav-item">
        <a class="nav-link" href="#settingsMenu" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="settingsMenu">
            <i class="bi bi-gear"></i> Settings <i class="bi bi-chevron-down ms-2"></i>
        </a>
        <div class="collapse show" id="settingsMenu">
            <ul class="nav flex-column ms-3">
                <li class="nav-item"><a class="nav-link" href="/dashboard/setting"><i class="bi bi-gear"></i> Profile Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/backup"><i class="bi bi-cloud-plus" style="font-size: 50; color: var(--primary-color);"></i> Backup & Restore</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/shopinfo"><i class="bi bi-info-circle-fill"></i> Shop Information</a></li>
            </ul>
        </div>
    </li>

    <li class="nav-item mt-5">
        <a class="nav-link text-danger" href="/logout" onclick="return confirm('Logout ထွက်မှာ သေချာပါသလား?')">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </li>
</ul>
        </nav>

    <div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
         <span class="navbar-brand fw-bold"><i class="bi bi-cloud-arrow-down"></i> Backup & Restore</span>
    </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card p-4 text-center action-card border-primary">
            <i class="bi bi-cloud-plus" style="font-size: 3rem; color: var(--primary-color);"></i>
            <h6 class="mt-2">Create Backup</h6>
            <button class="btn btn-sm btn-outline-primary mt-2">Generate Now</button>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-4 text-center action-card border-primary">
            <i class="bi bi-cloud-arrow-down" style="font-size: 3rem; color: #10b981;"></i>
            <h6 class="mt-2">Restore Backup</h6>
            <button class="btn btn-sm btn-outline-primary mt-2">Restore Now</button>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card p-4 text-center action-card border-primary">
            <i class="bi bi-cloud-upload" style="font-size: 3rem; color: #f59e0b;"></i>
            <h6 class="mt-2">Upload Backup</h6>
            <button class="btn btn-sm btn-outline-primary mt-2">Upload Now</button>
        </div>
    </div>
    </div>

<div class="table-responsive">
    <table class="custom-table">
        <thead>
            <tr>
                <th>Filename</th>
                <th>Size</th>
                <th>Created Date</th>
                <th class="text-center">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="fw-bold"><i class="bi bi-file-earmark-zip text-warning me-2"></i>minipj_backup</td>
                <td>1.14 MB</td>
                <td>18/06/2026</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-success border-0"><i class="bi bi-download"></i></button>
                    <button class="btn btn-sm btn-outline-primary border-0"><i class="bi bi-arrow-clockwise"></i></button>
                    <button class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</div>
</div>

<script>
       fetch('/api/get-shop-info')
        .then(res => res.json())
        .then(data => {
            if (data.logo_path) {
              
                document.getElementById('sidebar-logo').src = '/uploads/' + data.logo_path;
            }
        })
        .catch(err => console.error("Logo လှမ်းခေါ်မရပါ"));

</script>
</body>

</html>
