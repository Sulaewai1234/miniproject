<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <div class="sidebar-header text-center py-4">
                <img id="sidebar-logo" src="/images/default-logo.png" width="120" height="120" class="rounded-circle mb-2" alt="Logo">
                <h4 class="text-white">Software</h4>
            </div>
            <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/dashboard/main"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/welcome"><i class="bi bi-people"></i> User Management</a></li>
    <li class="nav-item"><a class="nav-link" href="/dashboard/product"><i class="bi bi-people"></i> Products</a></li>
    <li class="nav-item">
        <a class="nav-link" href="#settingsMenu" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="settingsMenu">
            <i class="bi bi-gear"></i> Settings <i class="bi bi-chevron-down ms-2"></i>
        </a>
        <div class="collapse" id="settingsMenu">
            <ul class="nav flex-column ms-3">
                <li class="nav-item"><a class="nav-link" href="/dashboard/setting"><i class="bi bi-gear"></i> Profile Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/backup"><i class="bi bi-cloud-plus" style="font-size: 50; color: var(--primary-color);"></i>Backup & Restore</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/shopinfo"><i class="bi bi-info-circle-fill"></i>Shop Information</a></li>
            </ul>
        </div>
    </li>

    <li class="nav-item mt-5">
        <a class="nav-link text-danger" href="/logout" onclick="return confirm('Logout ထွက်မှာ သေချာပါသလား?')">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </li>
</ul>
        </nav>

        <main class="col-md-9 col-lg-10 p-4">
            <nav class="navbar navbar-light bg-white p-3 mb-4 rounded shadow-sm">
                <span class="navbar-brand fw-bold">Overview</span>
                <div class="dropdown">
                    <a href="#" class="dropdown-toggle text-dark text-decoration-none" data-bs-toggle="dropdown">
                        👤 <span id="username-display">Loading...</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/dashboard/setting">Profile Details</a></li>
                        <li><a class="dropdown-item" href="/dashboard/setting">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="/dashboard/logout">Logout</a></li>
                    </ul>
                </div>
            </nav>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card p-4 border-0 shadow-sm text-primary">
                        <h5>Total Users</h5>
                        <p class="display-6 fw-bold" id="user-count">Loading...</p>
                    </div>
                </div>
                
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    
    fetch('/api/get-user-count')
        .then(response => response.json())
        .then(data => {
            document.getElementById('user-count').innerText = data.count;
        })
        .catch(err => console.error("Error loading user count:", err));

    
    fetch('/api/get-username')
        .then(response => response.json())
        .then(data => {
            document.getElementById('username-display').innerText = data.username;
        })
        .catch(err => console.error("Error loading username:", err));

         
    fetch('/api/get-shop-info')
        .then(res => res.json())
        .then(data => {
            if (data.logo_path) {
              
                document.getElementById('sidebar-logo').src = '/uploads/' + data.logo_path;
            }
        })
        .catch(err => console.error("Logo လှမ်းခေါ်မရပါ"));

</script>

</body>
</html>
