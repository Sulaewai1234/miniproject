<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css"> </head>
<body>

<div class="d-flex">
   <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <div class="sidebar-header text-center py-4">
                <img id="sidebar-logo" src="/images/default-logo.png" width="120" height="120" class="rounded-circle mb-2" alt="Logo">
                <h4 class="text-white">Software</h4>
            </div>
            <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/dashboard/main"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/welcome"><i class="bi bi-people"></i> User Management</a></li>
    
    <li class="nav-item">
        <a class="nav-link" href="#settingsMenu" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="settingsMenu">
            <i class="bi bi-gear"></i> Settings <i class="bi bi-chevron-down ms-2"></i>
        </a>
        <div class="collapse show" id="settingsMenu">
            <ul class="nav flex-column ms-3">
                <li class="nav-item"><a class="nav-link" href="/dashboard/setting"><i class="bi bi-gear"></i> Profile Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/backup"><i class="bi bi-cloud-plus" style="font-size: 50; color: var(--primary-color);"></i> Backup & Restore</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/shopinfo"><i class="bi bi-info-circle-fill"></i> Shop Information</a></li>
            </ul>
        </div>
    </li>

    <li class="nav-item mt-5">
        <a class="nav-link text-danger" href="/logout" onclick="return confirm('Logout ထွက်မှာ သေချာပါသလား?')">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </li>
</ul>
        </nav>

   <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 mt-4">
    
    <div class="header-card">
        <h3>Product Management</h3>
        <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#productModal">
            <i class="bi bi-plus-lg"></i> Add Product
        </button>
    </div>
    
    <div class="row g-4" id="product-container"></div>
</main>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="productForm" enctype="multipart/form-data" class="modal-content">
            <div class="modal-body">
                <input type="text" name="name" class="form-control mb-2" placeholder="Product Name" required>
                <input type="text" name="category" class="form-control mb-2" placeholder="Category">
                <input type="text" name="brand" class="form-control mb-2" placeholder="Brand">
                <input type="text" name="unit" class="form-control mb-2" placeholder="Unit">
                <input type="number" name="price" class="form-control mb-2" placeholder="Price" required>
                <input type="file" name="image" class="form-control" required>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-success">Save</button></div>
        </form>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="editForm" enctype="multipart/form-data" class="modal-content">
            <div class="modal-body">
                <input type="hidden" id="editId" name="id">
                <input type="text" id="editName" name="name" class="form-control mb-2" placeholder="Product Name">
                <input type="text" id="editCategory" name="category" class="form-control mb-2" placeholder="Category">
                <input type="text" id="editBrand" name="brand" class="form-control mb-2" placeholder="Brand">
                <input type="text" id="editUnit" name="unit" class="form-control mb-2" placeholder="Unit">
                <input type="number" id="editPrice" name="price" class="form-control mb-2" placeholder="Price">
                <input type="file" name="image" class="form-control">
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-warning">Update</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function fetchProducts() {
        const res = await fetch('/api/products');
        const data = await res.json();
        document.getElementById('product-container').innerHTML = data.map(p => `
            <div class="col-md-3">
                <div class="card h-100">
                    <img src="/uploads/${p.image}" class="card-img-top" style="height:150px; object-fit:cover;">
                    <div class="card-body text-center">
                        <h6>${p.name}</h6>
                        <p class="text-primary">${p.price} Ks</p>
                        <button class="btn btn-sm btn-outline-warning" onclick="openEdit(${p.id}, '${p.name}', '${p.category}', '${p.brand}', '${p.unit}', ${p.price})">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openEdit(id, name, cat, brand, unit, price) {
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = name;
        document.getElementById('editCategory').value = cat;
        document.getElementById('editBrand').value = brand;
        document.getElementById('editUnit').value = unit;
        document.getElementById('editPrice').value = price;
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    async function deleteProduct(id) {
        if(confirm('Delete?')) {
            await fetch(`/api/delete-product/${id}`, { method: 'DELETE' });
            fetchProducts();
        }
    }

    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        await fetch('/api/add-product', { method: 'POST', body: new FormData(e.target) });
        location.reload();
    };

    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        await fetch(`/api/update-product/${id}`, { method: 'POST', body: new FormData(e.target) });
        location.reload();
    };

    fetchProducts();


    
       fetch('/api/get-shop-info')
        .then(res => res.json())
        .then(data => {
            if (data.logo_path) {
              
                document.getElementById('sidebar-logo').src = '/uploads/' + data.logo_path;
            }
        })
        .catch(err => console.error("Logo လှမ်းခေါ်မရပါ"));
</script>
</body>
</html>
