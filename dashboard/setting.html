<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="d-flex">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <div class="sidebar-header text-center py-4">
                <img id="sidebar-logo" src="/images/default-logo.png" width="120" height="120" class="rounded-circle mb-2" alt="Logo">
                <h4 class="text-white">Software</h4>
            </div>
            <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/dashboard/main"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/welcome"><i class="bi bi-people"></i> User Management</a></li>
    
    <li class="nav-item">
        <a class="nav-link" href="#settingsMenu" data-bs-toggle="collapse" role="button" aria-expanded="false" aria-controls="settingsMenu">
            <i class="bi bi-gear"></i> Settings <i class="bi bi-chevron-down ms-2"></i>
        </a>
        <div class="collapse show" id="settingsMenu">
            <ul class="nav flex-column ms-3">
                <li class="nav-item"><a class="nav-link" href="/dashboard/setting"><i class="bi bi-gear"></i> Profile Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/backup"><i class="bi bi-cloud-plus" style="font-size: 50; color: var(--primary-color);"></i> Backup & Restore</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/shopinfo"><i class="bi bi-info-circle-fill"></i> Shop Information</a></li>
            </ul>
        </div>
    </li>

    <li class="nav-item mt-5">
        <a class="nav-link text-danger" href="/logout" onclick="return confirm('Logout ထွက်မှာ သေချာပါသလား?')">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </li>
</ul>
        </nav>
    <div class="main-content w-100">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card profile-card shadow-lg border-0">
                        <div class="card-header bg-primary text-white p-4">
                            <h3 class="mb-0"><i class="bi bi-person-circle"></i> Account Settings</h3>
                        </div>
                        <div class="card-body p-5">
                            <form action="/update-profile" method="POST" enctype="multipart/form-data">
                                <div class="row align-items-center">
                                    <div class="col-md-4 text-center border-end">
                                        <img id="profile-img" src="" alt="Profile" class="rounded-circle shadow mb-3 border border-4 border-light" width="180" height="180" style="object-fit: cover;">
                                        <div class="mb-3">
                                            <label class="btn btn-outline-primary btn-sm">
                                                Change Picture <input type="file" name="image" hidden>
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div class="col-md-8 ps-md-5">
                                        <div class="mb-3">
                                            <label class="fw-bold text-muted">Username</label>
                                            <input type="text" id="username" name="username" class="form-control form-control-lg bg-light" readonly>
                                        </div>
                                        <div class="mb-3">
                                            <label class="fw-bold text-muted">Email Address</label>
                                            <input type="email" id="email" name="email" class="form-control form-control-lg">
                                        </div>
                                        <div class="mb-3">
                                            <label class="fw-bold text-muted">New Password</label>
                                            <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••">
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                                            <i class="bi bi-floppy"></i> Save Changes
</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
   
    fetch('/api/get-user-data')
        .then(res => res.json())
        .then(user => {
            document.getElementById('username').value = user.username;
            document.getElementById('email').value = user.email;
            
            if (user.profile_image) {
                document.getElementById('profile-img').src = '/uploads/' + user.profile_image;
            }
        })
        .catch(err => console.error("Error fetching user data:", err));

    
    fetch('/api/get-shop-info')
        .then(res => res.json())
        .then(data => {
            if (data.logo_path) {
              
                document.getElementById('sidebar-logo').src = '/uploads/' + data.logo_path;
            }
        })
        .catch(err => console.error("Logo လှမ်းခေါ်မရပါ"));

</script>

</body>
</html>
