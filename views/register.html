<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <section class="min-vh-100 d-flex align-items-center py-5">
    
    <div class="container d-flex justify-content-center">
      
      <div class="card border-0 shadow-lg p-3 p-md-4 rounded-4 bg-white" style="max-width: 550px; width: 100%;">
        <div class="card-body">
          
          <h2 class="text-uppercase text-center mb-4 fw-bold text-dark fs-3">Create an account</h2>

          <form action="/register" method="POST" autocomplete="off" enctype="multipart/form-data">

            <div class="form-outline mb-4">
              <label class="form-label small fw-bold text-secondary" for="form3Example1cg">Your Name</label>
              <input type="text" name="username" id="form3Example1cg" class="form-control form-control-lg fs-6" 
                     placeholder="Enter your name" required />
            </div>

            <div class="form-outline mb-4">
              <label class="form-label small fw-bold text-secondary" for="form3Example3cg">Your Email</label>
              <input type="email" name="email" id="form3Example3cg" class="form-control form-control-lg fs-6" 
                     placeholder="Enter your email" autocomplete="one-time-code" required />
            </div>

            <div class="form-outline mb-4">
              <label class="form-label small fw-bold text-secondary" for="form3Example4cg">Password</label>
              <input type="password" name="password" id="form3Example4cg" class="form-control form-control-lg fs-6" 
                     placeholder="Enter password" autocomplete="new-password" required />
            </div>
            <div class="form-outline mb-4">
              <label class="form-label small fw-bold text-secondary" for="form3Example4cg">Password</label>
              <input type="file" name="image" id="form3Example4cg" class="form-control form-control-lg fs-6" 
                      accept="image/*"  />
            </div>

            <div class="form-check d-flex justify-content-center mb-4">
              <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3cg" required />
              <label class="form-check-label small text-secondary" for="form2Example3cg">
                I agree all statements in <a href="#!" class="text-primary text-decoration-none"><u>Terms of service</u></a>
              </label>
            </div>

            <div class="d-flex justify-content-center">
              <button type="submit" class="btn btn-success btn-lg w-100 fs-6 fw-bold shadow-sm" 
                      style="border-radius: 8px;">Register</button>
            </div>

            <p class="text-center small text-muted mt-4 mb-0">
              Have already an account? <a href="/login" class="fw-bold text-danger text-decoration-none">Login here</a>
            </p>

          </form>

        </div>
      </div>
      
    </div>

  </section>

</body>
</html>
