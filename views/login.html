<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

  <section class="min-vh-100 d-flex align-items-center py-5">
    
    <div class="container bg-white p-4 p-md-5 rounded-4 shadow-lg border-0" style="max-width: 950px;">
      
      <div class="row d-flex justify-content-center align-items-center">
        
        <div class="col-md-9 col-lg-6 col-xl-5 text-center mb-4 mb-lg-0">
          <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp"
            class="img-fluid" alt="Sample image" style="max-height: 300px;">
        </div>

        <div class="col-md-8 col-lg-6 col-xl-5 offset-xl-1">
          <div class="card border-0 shadow p-4 p-md-5 rounded-4 bg-white">
            
            <form action="/login" method="POST" autocomplete="off">
              
              <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                <p class="lead fw-normal mb-0 me-3 fs-6 fw-bold text-secondary">Sign in with</p>
                
                <button type="button" class="btn btn-primary btn-floating mx-1 btn-sm d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; border-radius: 50%;">
                    <i class="bi bi-facebook"></i>
                </button>

                <button type="button" class="btn btn-primary btn-floating mx-1 btn-sm d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; border-radius: 50%;">
                    <i class="bi bi-twitter-x"></i>
                </button>
              </div>

              <div class="d-flex align-items-center my-4">
                <hr class="text-muted w-100">
                <span class="mx-2 text-muted small fw-bold">Or</span>
                <hr class="text-muted w-100">
              </div>

              <div class="form-outline mb-4">
                <label class="form-label small fw-bold text-secondary">Email Address</label>
                <input type="email" name="email" id="form3Example3" class="form-control form-control-lg fs-6"
                  placeholder="Enter a valid email address" autocomplete="one-time-code" required />
              </div>

              <div class="form-outline mb-3">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" id="form3Example4" class="form-control form-control-lg fs-6"
                  placeholder="Enter password" autocomplete="new-password" required />
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check mb-0">
                  <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3" />
                  <label class="form-check-label small text-secondary" for="form2Example3">
                    Remember me
                  </label>
                </div>
              </div>

              <div class="text-center text-lg-start">
                <button type="submit" class="btn btn-primary btn-lg w-100 fs-6 fw-bold"
                  style="border-radius: 8px;">Login</button>
                <p class="small fw-bold mt-3 pt-1 mb-0 text-muted">
                  Don't have an account? <a href="/register" class="link-danger text-decoration-none">Register</a>
                </p>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>

  </section>

</body>
</html>
